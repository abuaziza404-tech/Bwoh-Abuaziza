name: Android Build From Uploaded ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "bawh_terrain_local_pro_v13_0_github_actions_build_ready_package.zip"
      - ".github/workflows/android-build-from-zip.yml"

permissions:
  contents: read

jobs:
  android-build-from-zip:
    name: Build APK/AAB from source ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SOURCE_ZIP: bawh_terrain_local_pro_v13_0_github_actions_build_ready_package.zip
      EXPECTED_GROUND_CELLS: "4303"
      EXPECTED_TRUTH_STATUS: partial_raw_grid_landsat_dem_not_full_spectral
      FINAL_ARTIFACT_ZIP: BOUH_v13_0_INSTALLABLE_ANDROID_ARTIFACTS.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify source ZIP exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$SOURCE_ZIP"
          unzip -t "$SOURCE_ZIP"

      - name: Extract source ZIP
        shell: bash
        run: |
          set -euo pipefail
          rm -rf extracted
          mkdir -p extracted
          unzip -q "$SOURCE_ZIP" -d extracted
          find extracted -maxdepth 3 -type d | sort

      - name: Resolve PROJECT_ROOT automatically
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_ROOT="$(find extracted -type f -path '*/data/precomputed/bouh_ground_grid.sqlite' -printf '%h\n' | sed 's#/data/precomputed$##' | head -n 1)"
          if [ -z "$PROJECT_ROOT" ]; then
            echo "Unable to resolve PROJECT_ROOT from bouh_ground_grid.sqlite" >&2
            exit 1
          fi
          test -d "$PROJECT_ROOT/apps/web"
          test -d "$PROJECT_ROOT/apps/web/android"
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> "$GITHUB_ENV"
          echo "Resolved PROJECT_ROOT=$PROJECT_ROOT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify ground grid SQLite integrity
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          root = Path(os.environ["PROJECT_ROOT"])
          db = root / "data/precomputed/bouh_ground_grid.sqlite"
          if not db.exists():
              raise SystemExit(f"Missing database: {db}")

          conn = sqlite3.connect(db)
          try:
              count = conn.execute("select count(*) from ground_cells").fetchone()[0]
              truth_rows = conn.execute(
                  "select truth_status, count(*) from ground_cells group by truth_status order by truth_status"
              ).fetchall()
              schema = [row[1] for row in conn.execute("pragma table_info(ground_cells)").fetchall()]
          finally:
              conn.close()

          expected_count = int(os.environ["EXPECTED_GROUND_CELLS"])
          expected_truth = os.environ["EXPECTED_TRUTH_STATUS"]

          if count != expected_count:
              raise SystemExit(f"ground_cells mismatch: {count} != {expected_count}")

          if truth_rows != [(expected_truth, expected_count)]:
              raise SystemExit(f"truth_status mismatch: {truth_rows}")

          required_fields = {
              "cell_id",
              "latitude",
              "longitude",
              "refl_brightness",
              "refl_red_green_proxy",
              "tir_brightness",
              "dem_elevation",
              "slope_proxy",
              "terrain_score",
              "alteration_proxy_score",
              "dryness_exposure_score",
              "structure_score",
              "evidence_count",
              "final_ground_score",
              "class",
              "truth_status",
              "limitation_ar",
          }
          missing = sorted(required_fields - set(schema))
          if missing:
              raise SystemExit(f"Missing ground_cells fields: {missing}")

          print(f"ground_cells={count}")
          print(f"truth_status={expected_truth}")
          print("Ground grid SQLite integrity OK")
          PY

      - name: Enforce Android assets heavy-file policy
        shell: bash
        run: |
          set -euo pipefail
          ASSETS="$PROJECT_ROOT/apps/web/android/app/src/main/assets/public"
          if [ -d "$ASSETS" ]; then
            FOUND="$(find "$ASSETS" -type f \( \
              -iname '*.tif' -o -iname '*.tiff' -o -iname '*.geotiff' -o \
              -iname '*.dem' -o -iname '*.zip' -o -iname '*.jp2' -o \
              -iname '*.mbtiles' -o -iname '*.pmtiles' \
            \) -print)"
            if [ -n "$FOUND" ]; then
              echo "Forbidden heavy Android assets found:" >&2
              echo "$FOUND" >&2
              exit 1
            fi
          fi
          echo "Android assets heavy-file policy OK"

      - name: Install web dependencies
        shell: bash
        working-directory: ${{ env.PROJECT_ROOT }}/apps/web
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build web
        shell: bash
        working-directory: ${{ env.PROJECT_ROOT }}/apps/web
        run: |
          set -euo pipefail
          npm run build

      - name: Sync Capacitor Android
        shell: bash
        working-directory: ${{ env.PROJECT_ROOT }}/apps/web
        run: |
          set -euo pipefail
          npx cap sync android

      - name: Re-check Android assets after Capacitor sync
        shell: bash
        run: |
          set -euo pipefail
          ASSETS="$PROJECT_ROOT/apps/web/android/app/src/main/assets/public"
          if [ -d "$ASSETS" ]; then
            FOUND="$(find "$ASSETS" -type f \( \
              -iname '*.tif' -o -iname '*.tiff' -o -iname '*.geotiff' -o \
              -iname '*.dem' -o -iname '*.zip' -o -iname '*.jp2' -o \
              -iname '*.mbtiles' -o -iname '*.pmtiles' \
            \) -print)"
            if [ -n "$FOUND" ]; then
              echo "Forbidden heavy Android assets found after sync:" >&2
              echo "$FOUND" >&2
              exit 1
            fi
          fi
          echo "Android assets heavy-file policy OK after sync"

      - name: Build Debug APK
        shell: bash
        working-directory: ${{ env.PROJECT_ROOT }}/apps/web/android
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Build Release AAB
        shell: bash
        working-directory: ${{ env.PROJECT_ROOT }}/apps/web/android
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Create Android checksums and final artifacts ZIP
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR="$PROJECT_ROOT/android-release-artifacts"
          mkdir -p "$ARTIFACT_DIR"

          find "$PROJECT_ROOT/apps/web/android/app/build/outputs/apk" -type f -name "*.apk" -exec cp {} "$ARTIFACT_DIR/" \;
          find "$PROJECT_ROOT/apps/web/android/app/build/outputs/bundle" -type f -name "*.aab" -exec cp {} "$ARTIFACT_DIR/" \;

          APK_COUNT="$(find "$ARTIFACT_DIR" -type f -name '*.apk' | wc -l | tr -d ' ')"
          AAB_COUNT="$(find "$ARTIFACT_DIR" -type f -name '*.aab' | wc -l | tr -d ' ')"

          if [ "$APK_COUNT" -lt 1 ]; then
            echo "No APK artifact was produced." >&2
            exit 1
          fi

          if [ "$AAB_COUNT" -lt 1 ]; then
            echo "No AAB artifact was produced." >&2
            exit 1
          fi

          CHECKSUM_FILE="$ARTIFACT_DIR/CHECKSUMS_ANDROID.txt"
          : > "$CHECKSUM_FILE"
          (
            cd "$ARTIFACT_DIR"
            sha256sum *.apk *.aab | sort
          ) > "$CHECKSUM_FILE"

          cp "$CHECKSUM_FILE" "$PROJECT_ROOT/CHECKSUMS_ANDROID.txt"

          python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          root = Path(os.environ["PROJECT_ROOT"])
          excluded_dirs = {"node_modules", ".gradle", ".pytest_cache", "__pycache__", "test-results", "playwright-report"}
          rows = []
          for path in sorted(root.rglob("*")):
              if not path.is_file():
                  continue
              rel_parts = set(path.relative_to(root).parts)
              if rel_parts & excluded_dirs:
                  continue
              if path.suffix.lower() in {".pyc", ".pyo"}:
                  continue
              if path.name == "CHECKSUMS_FULL.txt":
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              rows.append(f"{digest}  {path.relative_to(root).as_posix()}")
          (root / "CHECKSUMS_FULL.txt").write_text("\n".join(rows) + "\n", encoding="utf-8")
          PY

          (
            cd "$PROJECT_ROOT"
            zip -qr "$GITHUB_WORKSPACE/$FINAL_ARTIFACT_ZIP" \
              android-release-artifacts \
              CHECKSUMS_ANDROID.txt \
              CHECKSUMS_FULL.txt \
              BUILD_REPORT.md \
              RELEASE_NOTES.md \
              data/precomputed/BOUH_GROUND_GRID_BUILD_REPORT.md \
              data/precomputed/bouh_ground_grid.sqlite
          )

          echo "Final artifact ZIP: $FINAL_ARTIFACT_ZIP"
          sha256sum "$GITHUB_WORKSPACE/$FINAL_ARTIFACT_ZIP"

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BOUH-v13-0-APK-AAB
          path: |
            ${{ env.PROJECT_ROOT }}/android-release-artifacts/*.apk
            ${{ env.PROJECT_ROOT }}/android-release-artifacts/*.aab
            ${{ env.PROJECT_ROOT }}/android-release-artifacts/CHECKSUMS_ANDROID.txt
          if-no-files-found: error

      - name: Upload final installable artifacts ZIP
        uses: actions/upload-artifact@v4
        with:
          name: BOUH_v13_0_INSTALLABLE_ANDROID_ARTIFACTS
          path: BOUH_v13_0_INSTALLABLE_ANDROID_ARTIFACTS.zip
          if-no-files-found: error
